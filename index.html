<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FieldLab Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
      body {
        font-family: 'Assistant', sans-serif;
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      @media print {
        .no-print { display: none !important; }
        body { background: white; }
      }
      /* Hide arrows/spinners in number inputs */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }

      /* THE FORCE METHOD: Black borders for every cell in scientific tables */
      .scientific-table, 
      .scientific-table th, 
      .scientific-table td {
        border: 2px solid #000000 !important;
        border-collapse: collapse !important;
      }
      
      .scientific-table {
        width: 100%;
        background-color: #ffffff !important;
      }
      
      .scientific-table th, 
      .scientific-table td {
        padding: 8px !important;
        position: relative;
        color: #000000 !important;
      }

      .scientific-table thead th {
        background-color: #f1f5f9 !important;
        font-weight: 900 !important;
        text-align: center;
      }

      .scientific-table input {
        border: none !important;
        background-color: transparent !important;
        width: 100%;
        height: 100%;
        outline: none !important;
        text-align: center;
        font-family: inherit;
        font-weight: 900;
        display: block;
        padding: 12px 0 !important;
      }

      /* Sticky Header Support with Borders */
      .sticky-header-cell {
        position: sticky !important;
        top: 188px;
        z-index: 40;
        background-color: #f1f5f9 !important;
      }
      
      .sticky-col-cell {
        position: sticky !important;
        right: 0;
        z-index: 30;
        background-color: #ffffff !important;
        box-shadow: inset -2px 0 0 #000000;
      }
    </style>
    <script>
      window.process = { env: {} };
      window.addEventListener('error', function(event) {
        console.error('FieldLab Uncaught Error:', event.error);
      });
    </script>

  }
}
</script>

</head>
